<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F19"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B00"/>
      <stop offset="100%" stop-color="#FF8C42"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6B00" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FF6B00" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="224" height="224" rx="48" fill="url(#bg)"/>

  <!-- Outer orbital ring -->
  <circle cx="128" cy="128" r="78" fill="none" stroke="url(#ring)" stroke-width="10" opacity="0.9"/>

  <!-- Dashed orbital detail -->
  <circle cx="128" cy="128" r="56" fill="none" stroke="#FF6B00" stroke-width="4" stroke-dasharray="16 16" opacity="0.5"/>

  <!-- Glow behind planet -->
  <circle cx="128" cy="128" r="38" fill="url(#glow)"/>

  <!-- Central planet / dot -->
  <circle cx="128" cy="128" r="24" fill="url(#ring)"/>

  <!-- Satellite dot -->
  <circle cx="206" cy="128" r="9" fill="#F8FAFC"/>

  <!-- Inner highlight -->
  <circle cx="120" cy="120" r="7" fill="#ffffff" opacity="0.35"/>
</svg>